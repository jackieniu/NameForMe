# 定时请求线上 /api/health，减轻免费 Web Service 休眠冷启。
# GitHub → Settings → Secrets → Actions → 新建 KEEPALIVE_URL = https://<服务名>.onrender.com/api/health
name: Render keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health
        env:
          URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "KEEPALIVE_URL 未设置，跳过" >&2
            exit 0
          fi
          curl -fsS -o /dev/null -w "HTTP %{http_code}\n" --max-time 60 "$URL"
