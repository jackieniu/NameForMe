# OpenNext for Cloudflare：Worker 入口 + 静态资源 + KV/D1（限流）
# 构建产物目录由 `npm run cf:build`（opennextjs-cloudflare build）生成。
# 详见 docs/cloudflare-deploy.md
#
# 占位 id 可提交；敏感 Token 勿写此处。本机可用 wrangler.local.toml 覆盖（.gitignore）。

name = "nameforme"
main = ".open-next/worker.js"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "nameforme"

[[kv_namespaces]]
binding = "BLOCKLIST"
id = "f50465e4d576440fa8afcf763cf96685"

[[d1_databases]]
binding = "DB"
database_name = "nameforme_rate"
database_id = "89073b4b-180a-482c-b55b-a7553468803f"
migrations_dir = "migrations"
